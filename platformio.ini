; PlatformIO Project Configuration File
; Minimal ESP32 USB-C Serial Console Server

; ESP32-S2 (Recommended - Native USB-C)
[env:esp32-s2]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
monitor_speed = 115200

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3

lib_deps = 
    links2004/WebSockets@^2.4.1

; ESP32-S3 (Also has native USB-C)
[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3

lib_deps = 
    links2004/WebSockets@^2.4.1

; Original ESP32 (Uses HardwareSerial, needs USB-Serial adapter for console)
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags = 
    -DCORE_DEBUG_LEVEL=3

lib_deps = 
    links2004/WebSockets@^2.4.1